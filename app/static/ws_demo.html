<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>社群輿情問答</title>
<style>
  :root {
    --bg:#ffffff; --panel:#f7f8fa; --line:#e3e6ea; --text:#1f2328; --muted:#6b7280;
    --accent:#2563eb; --green:#15803d; --yellow:#a16207; --red:#dc2626;
    --warn-bg:#fef9e7; --warn-line:#eab308;
  }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--text); font-size:15px;
         font-family:"Noto Sans TC",-apple-system,"Segoe UI",sans-serif;
         display:grid; grid-template-rows:auto 1fr auto; height:100vh; }

  header { padding:12px 20px; border-bottom:1px solid var(--line); display:flex;
           align-items:center; gap:12px; }
  h1 { font-size:16px; margin:0; font-weight:600; }
  #status { font-size:12px; color:var(--muted); margin-left:auto; }

  main { display:grid; grid-template-columns:minmax(280px,1fr) 2fr;
         gap:1px; background:var(--line); min-height:0; }
  section { background:var(--bg); overflow-y:auto; padding:16px 20px; min-height:0; }
  #left { display:flex; flex-direction:column; background:var(--panel); }
  h2 { font-size:11px; letter-spacing:.12em; text-transform:uppercase;
       color:var(--muted); margin:0 0 12px; font-weight:600; }

  #log { font-family:ui-monospace,"Cascadia Code",Consolas,monospace; font-size:12.5px;
         line-height:1.8; flex:1 1 auto; }
  #log div { white-space:pre-wrap; word-break:break-word; }
  .dim { color:var(--muted); }
  .ok { color:var(--green); }
  .warn { color:var(--yellow); }
  .err { color:var(--red); }
  .fallback { color:#854d0e; background:var(--warn-bg); border-left:3px solid var(--warn-line);
              padding:4px 8px; margin:5px 0; border-radius:3px; }

  /* 帳號區：釘在左欄最底部（比照 Streamlit sidebar 的 ChatGPT 風格） */
  #acct { margin-top:auto; padding-top:14px; border-top:1px solid var(--line); position:relative; }
  #acctBtn { width:100%; text-align:left; background:var(--bg); color:var(--text);
             border:1px solid var(--line); font-weight:500; }
  #acctBtn:hover { background:#eef1f5; }
  #popover { display:none; position:absolute; bottom:calc(100% + 6px); left:0; right:0;
             background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px;
             box-shadow:0 6px 20px rgba(0,0,0,.1); }
  #popover.open { display:block; }
  #popover .who { font-size:12px; color:var(--muted); margin-bottom:8px; }

  /* 對話紀錄 */
  .turn { margin-bottom:26px; }
  .user { background:var(--panel); border:1px solid var(--line); border-radius:10px;
          padding:10px 14px; margin-bottom:14px; }
  .light { font-size:13px; margin-bottom:8px; }
  .answer { white-space:pre-wrap; line-height:1.85; }
  .answer.streaming::after { content:"▌"; color:var(--accent);
                             animation:blink 1s steps(2,start) infinite; }
  @keyframes blink { to { visibility:hidden; } }
  /* 來源：依平台分組的原生收合區塊（＝Streamlit st.expander 的 HTML 對應物，免 JS） */
  .sources { margin-top:16px; padding-top:12px; border-top:1px solid var(--line); font-size:13px; }
  .sources details { border:1px solid var(--line); border-radius:8px; margin:8px 0; }
  .sources summary { cursor:pointer; padding:10px 14px; display:flex; align-items:center;
                     gap:8px; user-select:none; list-style:none; border-radius:8px; }
  .sources summary:hover { background:var(--panel); }
  .sources summary::-webkit-details-marker { display:none; }  /* Chrome/Safari 預設三角 */
  .sources summary::before { content:"▸"; display:inline-block; color:var(--muted);
                             font-size:11px; transition:transform .15s; }
  .sources details[open] summary::before { transform:rotate(90deg); }
  .sources ol { margin:0; padding:0 14px 12px 42px; color:var(--muted); }
  .sources li { margin:6px 0; }
  .sources a { color:var(--accent); text-decoration:none; }
  .sources a:hover { text-decoration:underline; }

  /* 底部輸入列 */
  footer { border-top:1px solid var(--line); padding:14px 20px; display:flex; gap:8px; }
  input, button { font:inherit; border-radius:8px; border:1px solid var(--line); }
  input { flex:1; background:var(--bg); color:var(--text); padding:11px 14px; }
  input:focus { outline:2px solid var(--accent); outline-offset:-1px; }
  button { padding:11px 20px; cursor:pointer; background:var(--accent); color:#fff;
           border:none; font-weight:600; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  #stop { background:var(--red); }
  #newChat { padding:5px 12px; font-size:12.5px; font-weight:500; background:var(--bg);
             color:var(--muted); border:1px solid var(--line); }
  #newChat:hover:not(:disabled) { background:var(--panel); color:var(--text); }

  /* 登入 / 註冊彈窗 */
  #modal { display:none; position:fixed; inset:0; background:rgba(15,20,30,.45);
           align-items:center; justify-content:center; z-index:10; }
  #modal.open { display:flex; }
  .card { background:var(--bg); border-radius:12px; padding:24px; width:340px;
          box-shadow:0 20px 50px rgba(0,0,0,.25); }
  .card h3 { margin:0 0 6px; font-size:17px; }
  .card p { margin:0 0 18px; font-size:12.5px; color:var(--muted); line-height:1.6; }
  .tabs { display:flex; gap:6px; margin-bottom:16px; }
  .tabs button { flex:1; background:var(--panel); color:var(--muted); border:1px solid var(--line);
                 padding:8px; font-weight:500; }
  .tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .card input { width:100%; margin-bottom:10px; }
  .card .row { display:flex; gap:8px; margin-top:6px; }
  .card .row button { flex:1; }
  #cancelBtn { background:var(--panel); color:var(--text); border:1px solid var(--line); }
  #modalErr { color:var(--red); font-size:12.5px; min-height:1.2em; margin-bottom:6px; }
</style>
</head>
<body>
<header>
  <h1>SEIQA · 社群輿情問答</h1>
  <span id="status">未連線</span>
  <button id="newChat">＋ 新對話</button>
</header>

<main>
  <section id="left">
    <h2>Agent 即時進度</h2>
    <div id="log"><div class="dim">送出問題後，這裡會即時顯示 agent 的每一步。</div></div>
    <div id="acct">
      <div id="popover">
        <div class="who" id="who"></div>
        <button id="logoutBtn" style="width:100%">登出</button>
      </div>
      <button id="acctBtn">👤 登入 / 註冊</button>
    </div>
  </section>
  <section id="chat"></section>
</main>

<footer>
  <input id="q" placeholder="問點什麼…例如：遠距離戀愛可以維持嗎？" autocomplete="off">
  <button id="send">送出</button>
  <button id="stop" disabled>停止</button>
</footer>

<div id="modal">
  <div class="card">
    <h3>登入 / 註冊</h3>
    <p>未登入＝匿名。登入後會套用你的個人偏好，對話也會歸到你名下，登出時整段對話會摘要進長期記憶。</p>
    <div class="tabs">
      <button id="tabLogin" class="active">登入</button>
      <button id="tabReg">註冊</button>
    </div>
    <input id="mu" placeholder="帳號" autocomplete="username">
    <input id="mp" type="password" placeholder="密碼" autocomplete="current-password">
    <input id="md" placeholder="顯示名稱（選填）" style="display:none">
    <div id="modalErr"></div>
    <div class="row">
      <button id="cancelBtn">取消</button>
      <button id="submitBtn">登入</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const newSid = () => "ws-" + Math.random().toString(36).slice(2, 10);

// sid 放網址（比照 Streamlit）：F5 後 sid 不變，才有得還原。
let sessionId = new URLSearchParams(location.search).get("sid") || newSid();
// 送給後端的對話上下文：**只能有 role/content**——它會被原樣攤進 LLM 的 messages 陣列，
// 多塞 sources 之類的欄位會被 OpenAI API 拒收。
let chatHistory = [];
// 畫面用的同一段對話（多帶 sources，重整後才重畫得出來源清單）。兩者一起長、一起清。
let turns = [];            // [{q, a, sources}]
let ws = null, busy = false, mode = "login";
let token = null, userName = null;
let turn = null;           // 當前這一輪的 DOM 節點集合
const progressLines = {};  // platform -> 就地更新的那一行，避免逐篇洗版

/* ---------- 本機持久化（方法 A）----------
   localStorage 存 token 與各 sid 的對話。註：token 放 localStorage 會被 XSS 讀走，
   demo 可接受；正式環境應改用 httpOnly cookie。 */
const LS_TOKEN = "seiqa.token", LS_USER = "seiqa.user";
const histKey = sid => `seiqa.hist.${sid}`;

function lsGet(k) { try { return localStorage.getItem(k); } catch { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch { /* 無痕模式/配額滿：不持久化就是了 */ } }
function lsDel(k) { try { localStorage.removeItem(k); } catch { /* 同上 */ } }

function saveLocal() { lsSet(histKey(sessionId), JSON.stringify(turns)); }

function loadLocal() {
  try { return JSON.parse(lsGet(histKey(sessionId)) || "[]"); } catch { return []; }
}

function setSid(sid) {
  sessionId = sid;
  window.history.replaceState(null, "", `?sid=${encodeURIComponent(sid)}`);  // 不留下一堆上一頁
}

/* ---------- 進度欄 ---------- */
function log(text, cls) {
  const div = document.createElement("div");
  if (cls) div.className = cls;
  div.textContent = text;
  $("log").appendChild(div);
  $("left").scrollTop = 1e9;
  return div;
}

function setBusy(on) {
  busy = on;
  $("send").disabled = on;
  $("stop").disabled = !on;
  $("acctBtn").disabled = on;   // 問答進行中不讓人登入／登出（會需要重連 WebSocket）
  if (turn) turn.answer.classList.toggle("streaming", on);
}

/* ---------- 對話紀錄 ---------- */
function newTurn(question) {
  const wrap = document.createElement("div");
  wrap.className = "turn";
  const user = document.createElement("div");
  user.className = "user";
  user.textContent = question;
  const light = document.createElement("div");
  light.className = "light";
  const answer = document.createElement("div");
  answer.className = "answer streaming";
  const sources = document.createElement("div");
  sources.className = "sources";
  sources.style.display = "none";
  wrap.append(user, light, answer, sources);
  $("chat").appendChild(wrap);
  $("chat").scrollTop = 1e9;
  return { wrap, light, answer, sources, text: "" };
}

// 顯示順序固定；最後一組（空字串 key）收容未知平台，加平台時沒對應到就不會憑空消失
const SOURCE_GROUPS = [
  ["dcard", "📘 Dcard 及時爬"],
  ["ptt", "📗 PTT"],
  ["", "其他"],
];

function renderSources(box, list) {
  if (!list.length) return;

  // 先記下每一筆在「完整來源清單」裡的序號再分組：那個號碼要對得上答案內文的 [n]，
  // 所以各組內是跳號的（PTT 那組可能出現 7. 8. 42.），不是每組重新從 1 數起。
  const groups = new Map(SOURCE_GROUPS.map(([key]) => [key, []]));
  list.forEach((s, i) => {
    const key = groups.has(s.source) ? s.source : "";
    groups.get(key).push({ ...s, n: i + 1 });
  });

  const heading = document.createElement("h2");
  heading.textContent = "來源";
  box.appendChild(heading);

  for (const [key, label] of SOURCE_GROUPS) {
    const items = groups.get(key);
    if (!items.length) continue;                 // 空的組不顯示

    const details = document.createElement("details");   // 不加 open ＝ 預設收合
    const summary = document.createElement("summary");
    summary.textContent = `${label}（${items.length}）`;

    const ol = document.createElement("ol");
    for (const s of items) {
      const li = document.createElement("li");
      li.value = s.n;                            // 保留全域編號
      const a = document.createElement("a");
      a.href = s.url; a.target = "_blank"; a.rel = "noopener";
      a.textContent = s.title || s.url;          // textContent：標題來自外部網站，不當 HTML 解讀
      li.appendChild(a);
      ol.appendChild(li);
    }
    details.append(summary, ol);
    box.appendChild(details);
  }
  box.style.display = "block";
}

function setLight(node, hasSources) {
  node.innerHTML = hasSources
    ? '<span style="color:var(--green)">🟢 綜合社群討論作答</span>'
    : '<span style="color:var(--yellow)">🟡 未查到社群討論，以 LLM 既有常識作答</span>';
}

/* ---------- 還原（方法 B：後端讀 MySQL；失敗才退回本機備份）---------- */
function renderRestored(list) {
  for (const t of list) {
    const node = newTurn(t.q);
    node.answer.classList.remove("streaming");   // 還原的不是正在生成的
    node.answer.textContent = t.a;
    setLight(node.light, (t.sources || []).length > 0);
    renderSources(node.sources, t.sources || []);
  }
}

/** 後端回的是逐則訊息（[{role, content, sources}]），畫面要的是逐輪（q/a）→ 配對成對。 */
function toTurns(messages) {
  const out = [];
  for (let i = 0; i < messages.length; i++) {
    if (messages[i].role !== "user") continue;
    const next = messages[i + 1];
    if (!next || next.role !== "assistant") continue;  // 落單的 user（例如被取消那輪）就跳過
    out.push({ q: messages[i].content, a: next.content, sources: next.sources || [] });
  }
  return out;
}

async function restore() {
  let restored = [];
  if (token) {
    try {
      const r = await fetch(`/conversation/${encodeURIComponent(sessionId)}`,
                            { headers: { Authorization: `Bearer ${token}` } });
      if (r.ok) restored = toTurns((await r.json()).history || []);
    } catch (e) {
      console.warn("後端還原失敗，改用本機備份", e);
    }
  }
  // 匿名（後端沒有可綁定的對話）、或 DB 沒開／落地失敗 → 退回本機那份
  if (!restored.length) restored = loadLocal();
  if (!restored.length) return;

  turns = restored;
  chatHistory = restored.flatMap(t => [{ role: "user", content: t.q },
                                       { role: "assistant", content: t.a }]);
  renderRestored(turns);
  saveLocal();   // 後端版本回填本機，兩邊對齊
  log(`已載入這段對話的 ${turns.length} 輪紀錄`, "dim");
}

/* ---------- WebSocket ---------- */
function connect() {
  return new Promise(resolve => {
    if (ws) { ws.onclose = null; ws.close(); }   // 靜默關掉舊連線（換 token 時）
    // 瀏覽器不能給 WebSocket 加 Authorization header → token 只能走 query string。
    // 而且 token 是握手時讀一次，之後這條連線的身分就固定了 → 登入/登出都必須重連。
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/ask` +
                       (token ? `?token=${encodeURIComponent(token)}` : ""));
    ws.onopen = () => {
      $("status").textContent = (userName ? `${userName} · ` : "匿名 · ") + "已連線";
      resolve();
    };
    ws.onclose = () => { $("status").textContent = "連線已關閉"; setBusy(false); };
    ws.onerror = () => { $("status").textContent = "連線錯誤"; setBusy(false); };
    ws.onmessage = e => handle(JSON.parse(e.data));
  });
}

function handle(ev) {
  switch (ev.type) {
    case "stage":       log("● " + ev.text); break;
    case "search_start": log(`▶ 並行查詢：${ev.platforms.join(" + ")}`, "dim"); break;

    case "crawl_plan":
      log(`  ${ev.platform}｜${ev.board ? "看板 " + ev.board + "、" : ""}關鍵字：${ev.keywords.join(" / ")}`, "dim");
      break;

    case "crawl_search":
      log(`  ${ev.platform}｜搜到 ${ev.found} 篇，開始深挖內文與留言`, "dim"); break;

    case "crawl_progress": {
      const text = ev.total ? `  ${ev.platform}｜已深挖 ${ev.done}/${ev.total} 篇`
                            : `  ${ev.platform}｜已抓 ${ev.done} 篇`;
      if (progressLines[ev.platform]) progressLines[ev.platform].textContent = text;
      else progressLines[ev.platform] = log(text, "dim");
      break;
    }

    case "crawl_budget":
      log(`  ${ev.platform}｜到時間預算，帶著已抓到的 ${ev.done} 篇收工`, "warn"); break;

    // 分層 fail-safe 現形：這件事原本只寫進後端 log，使用者永遠不知道發生過
    case "source_fallback":
      log(`⚠ ${ev.platform} 即時爬沒有結果 → 自動退回向量庫 fallback`, "fallback"); break;

    case "source_error":
      log(`✕ ${ev.platform} 失敗（只少這一邊，其他來源照常）：${ev.message}`, "err"); break;

    case "source_done":
      log(`✔ ${ev.platform}｜${ev.count} 篇（${ev.elapsed}s）`, "ok"); break;

    case "search_done": {
      const parts = Object.entries(ev.counts).map(([p, n]) => `${p} ${n}`).join("、");
      log(`═ 合計 ${ev.total} 篇${parts ? "（" + parts + "）" : ""}`, "ok");
      break;
    }

    case "token":
      turn.text += ev.text;
      turn.answer.textContent = turn.text;
      $("chat").scrollTop = 1e9;
      break;

    case "answer_reset":   // 規劃輪先吐了字但最後決定用工具 → 那些字不是答案
      turn.text = "";
      turn.answer.textContent = "";
      break;

    case "done":
      setLight(turn.light, ev.light === "green");
      renderSources(turn.sources, ev.sources);
      chatHistory.push({ role: "user", content: turn.question });
      chatHistory.push({ role: "assistant", content: ev.answer });
      turns.push({ q: turn.question, a: ev.answer, sources: ev.sources || [] });
      saveLocal();   // 後端這輪也已 persist_turn()；本機這份是匿名/DB 沒開時的備援
      setBusy(false);
      break;

    case "cancelled":
      log("■ 已停止（背景爬蟲會在時間預算內自行收工）", "warn");
      turn.answer.textContent = turn.text || "（已停止）";
      setBusy(false);
      break;

    case "error":
      log("✕ 錯誤：" + ev.message, "err");
      turn.answer.textContent = "（發生錯誤，請看左邊進度欄）";
      setBusy(false);
      break;
  }
}

/* ---------- 提問 ---------- */
async function ask() {
  const question = $("q").value.trim();
  if (!question || busy) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) await connect();

  $("log").innerHTML = "";
  for (const k in progressLines) delete progressLines[k];
  log("? " + question, "dim");

  turn = newTurn(question);
  turn.question = question;
  setBusy(true);
  ws.send(JSON.stringify({ type: "ask", message: question,
                           session_id: sessionId, history: chatHistory }));
  $("q").value = "";
}

/* ---------- 登入 / 註冊 / 登出 ---------- */
function resetConversation() {
  setSid(newSid());         // 換 sid（同時更新網址）：登入後開一段乾淨對話，不把匿名訊息算進使用者名下
  chatHistory = [];
  turns = [];
  $("chat").innerHTML = "";
  $("log").innerHTML = "";
  turn = null;
}

function setTab(next) {
  mode = next;
  $("tabLogin").classList.toggle("active", mode === "login");
  $("tabReg").classList.toggle("active", mode === "register");
  $("md").style.display = mode === "register" ? "block" : "none";
  $("submitBtn").textContent = mode === "register" ? "註冊並登入" : "登入";
  $("modalErr").textContent = "";
}

function renderAcct() {
  $("acctBtn").textContent = token ? `👤 ${userName}` : "👤 登入 / 註冊";
  $("who").textContent = token ? `已登入：${userName}` : "";
  $("popover").classList.remove("open");
}

async function submitAuth() {
  $("modalErr").textContent = "";
  $("submitBtn").disabled = true;
  try {
    // 打自家 :8001 的代理，由它轉發給 Django :8000（瀏覽器直接打會被跨來源政策擋掉）
    const r = await fetch(`/demo/auth/${mode}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: $("mu").value.trim(), password: $("mp").value,
                             display_name: $("md").value.trim() }),
    });
    const data = await r.json();
    if (!r.ok) { $("modalErr").textContent = data.detail || `失敗（HTTP ${r.status}）`; return; }

    token = data.token;
    userName = data.display_name || data.username;
    lsSet(LS_TOKEN, token);
    lsSet(LS_USER, userName);
    $("modal").classList.remove("open");
    $("mu").value = $("mp").value = $("md").value = "";
    resetConversation();
    renderAcct();
    await connect();                       // 換了 token → 必須用新身分重新握手
    log(`已登入為 ${userName}，這段對話會歸到你名下`, "ok");
  } catch (e) {
    $("modalErr").textContent = "連線失敗：" + e.message;
  } finally {
    $("submitBtn").disabled = false;
  }
}

async function logout() {
  const name = userName;
  $("popover").classList.remove("open");
  setBusy(true);
  log("登出中：整段對話摘要進長期記憶、推論偏好…", "dim");
  try {
    // /logout 在同一個 :8001，是普通 HTTP → 這裡就能正常帶 Authorization header
    await fetch("/logout", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ session_id: sessionId, history: chatHistory }),
    });
  } catch (e) {
    console.warn("登出請求失敗（仍會清掉本地身分）", e);
  }
  setBusy(false);
  // 後端已把這段對話軟刪（is_deleted=1），本機那份備份也要一起清掉——
  // 否則下一位在同一台瀏覽器開同一個 sid，還會從 localStorage 讀回這段對話。
  lsDel(histKey(sessionId));
  lsDel(LS_TOKEN); lsDel(LS_USER);
  token = null; userName = null;
  resetConversation();
  renderAcct();
  await connect();                          // 重連成匿名身分
  log(`${name} 已登出，已回到匿名對話`, "ok");
}

/* ---------- 事件綁定 ---------- */
$("send").onclick = ask;
$("q").onkeydown = e => { if (e.key === "Enter") ask(); };
$("stop").onclick = () => {
  if (ws && busy) { ws.send(JSON.stringify({ type: "cancel" })); log("… 已送出停止訊號", "warn"); }
};
$("acctBtn").onclick = () => {
  if (token) $("popover").classList.toggle("open");
  else { setTab("login"); $("modal").classList.add("open"); $("mu").focus(); }
};
$("logoutBtn").onclick = logout;
$("tabLogin").onclick = () => setTab("login");
$("tabReg").onclick = () => setTab("register");
$("cancelBtn").onclick = () => $("modal").classList.remove("open");
$("submitBtn").onclick = submitAuth;
$("mp").onkeydown = e => { if (e.key === "Enter") submitAuth(); };
$("modal").onclick = e => { if (e.target.id === "modal") $("modal").classList.remove("open"); };
$("newChat").onclick = () => {
  if (busy) return;                 // 生成中換 sid 會讓這一輪落地到孤兒對話
  resetConversation();              // sid 留在網址、舊對話仍在 DB（可用舊網址回去）
  log("已開一段新對話", "dim");
};

/* ---------- 啟動 ---------- */
async function boot() {
  setSid(sessionId);                            // 新開的頁面：把 sid 補進網址，F5 才回得來
  token = lsGet(LS_TOKEN);
  userName = lsGet(LS_USER);
  if (token) {
    // token 有 7 天效期。過期還頂著使用者名稱最糟：畫面顯示已登入，記憶／偏好卻全部靜默失效
    // （runtime 驗不過就當匿名）。開場問一次 /me，過期就誠實退回匿名。
    try {
      const r = await fetch("/me", { headers: { Authorization: `Bearer ${token}` } });
      const ok = r.ok && (await r.json()).authenticated;
      if (!ok) {
        lsDel(LS_TOKEN); lsDel(LS_USER);
        token = null; userName = null;
        log("登入已過期，已回到匿名（重新登入即可繼續累積長期記憶）", "warn");
      }
    } catch (e) {
      console.warn("驗證 token 失敗，先當作匿名", e);
    }
  }
  renderAcct();
  await connect();
  await restore();                              // 有 token → 讀 MySQL；否則退回本機備份
}

boot();
</script>
